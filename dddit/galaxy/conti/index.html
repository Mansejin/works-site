<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <title>대본 · Galaxy · 디디딧</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --header-bg: #0f172a;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      padding: 32px 20px 48px;
    }

    .page { max-width: 760px; margin: 0 auto; }

    .hub-nav { margin-bottom: 16px; }
    .hub-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .hub-nav a:hover { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--header-bg);
      color: #f8fafc;
      padding: 22px 24px;
    }

    .card-header h1 { font-size: 1.35rem; font-weight: 700; }
    .card-header p { color: #cbd5e1; font-size: 0.88rem; margin-top: 6px; }

    .status-bar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-muted);
      background: #fafbfc;
    }

    .status-bar.error {
      background: #fef2f2;
      color: #b91c1c;
      border-color: #fecaca;
    }

    .script-prose {
      padding: 24px 28px 32px;
      font-size: 1rem;
    }

    .script-line {
      margin-bottom: 0.85em;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .script-line:last-child { margin-bottom: 0; }

    .script-empty, .empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      body { padding: 20px 12px 36px; }
      .script-prose { padding: 18px 16px 24px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-header">
        <h1 id="page-title">대본</h1>
        <p>최종 대본 (읽기 전용 · 대본 열만)</p>
      </div>
      <div id="status-bar" class="status-bar">불러오는 중…</div>
      <div id="script-prose" class="script-prose"></div>
      <div id="conti-empty" class="empty" hidden>등록된 대본이 없습니다.</div>
    </div>
  </div>

  <script src="../../js/brand-portal-page.js"></script>
  <script src="../../js/conti-api.js"></script>
  <script src="../../js/script-view.js"></script>
  <script>
    DdditScriptView.mount({
      project: "galaxy",
      titleEl: document.getElementById("page-title"),
      statusEl: document.getElementById("status-bar"),
      proseEl: document.getElementById("script-prose"),
      emptyEl: document.getElementById("conti-empty"),
      defaultTitle: "대본",
    });
  </script>
</body>
</html>
