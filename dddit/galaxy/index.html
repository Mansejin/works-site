<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="디디딧 · 갤럭시 Z 폴드8 · 울트라 구매 리뷰" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <title>갤럭시 Z 폴드8 · 디디딧</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --header-bg: #0f172a;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 20px 56px;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
    }

    .hub-nav {
      margin-bottom: 16px;
    }

    .hub-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .hub-nav a:hover {
      color: var(--accent);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--header-bg);
      color: #f8fafc;
      padding: 28px 28px 24px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid rgba(147, 197, 253, 0.35);
      color: #bfdbfe;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin-top: 18px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .meta strong {
      color: #e2e8f0;
      font-weight: 600;
    }

    .card-body {
      padding: 24px 28px 28px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .overview {
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .overview p + p {
      margin-top: 10px;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .link-card {
      display: block;
      padding: 18px 18px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      background: #fafbfc;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .link-card:hover {
      border-color: #93c5fd;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.08);
      transform: translateY(-1px);
    }

    .link-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .link-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .link-card.is-ready {
      background: var(--accent-soft);
      border-color: #bfdbfe;
    }

    .link-card .status {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
    }

    .link-card.is-soon .status {
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 16px 40px;
      }

      .card-header,
      .card-body {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-header">
        <span class="badge">디디딧</span>
        <h1>갤럭시 Z 폴드8 · 울트라</h1>
        <p class="subtitle">본인 구매 예정 리뷰 · 광고 아님</p>
        <div class="meta">
          <span><strong>채널</strong> 디디딧</span>
          <span><strong>유형</strong> 구매 리뷰</span>
          <span><strong>제품</strong> Z Fold8 / Fold8 Ultra</span>
        </div>
      </div>

      <div class="card-body">
        <div class="section-title">프로젝트 개요</div>
        <div class="overview">
          <p>삼성 갤럭시 Z 폴드8 / Z 폴드8 울트라 본인 구매 예정 리뷰. 광고·협찬 아님.</p>
          <p>기획안·대본·스펙 메모를 이 페이지에서 공유합니다.</p>
        </div>

        <div class="section-title">자료</div>
        <div class="link-grid">
          <a class="link-card is-ready" href="plan/">
            <h2>기획안</h2>
            <p>콘텐츠 방향, 일정, 리뷰 가이드 등 프로젝트 기획</p>
            <span class="status">바로가기 →</span>
          </a>
          <a class="link-card is-ready" href="conti/">
            <h2>대본</h2>
            <p>최종 대본 (읽기 전용 · 대본 열만)</p>
            <span class="status">보기 →</span>
          </a>
          <a class="link-card is-ready" href="productlist/">
            <h2>제품 리스트</h2>
            <p>구매 후보 스펙·가격·색상 메모</p>
            <span class="status">바로가기 →</span>
          </a>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/brand-portal-page.js"></script>
</body>
</html>
