<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>팀 로그인 · 디디딧</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }
    .card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
    }
    h1 { font-size: 1.2rem; margin-bottom: 8px; }
    p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.55; margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      margin-bottom: 14px;
    }
    input:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .error {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 0.85rem;
      display: none;
    }
    .error.show { display: block; }
    html.team-gate-pending body { visibility: hidden; }
  </style>
  <style>html.team-gate-pending body { visibility: hidden; }</style>
</head>
<body>
  <div class="card">
    <h1>디디딧 팀 로그인</h1>
    <p>워크스페이스 내부 페이지는 팀 비밀번호가 필요합니다.</p>
    <form id="gate-form">
      <label for="passcode">비밀번호</label>
      <input id="passcode" type="password" autocomplete="current-password" placeholder="비밀번호 입력" required />
      <button id="btn-login" type="submit">로그인</button>
    </form>
    <p id="gate-error" class="error" role="alert"></p>
  </div>

  <script>
    (function () {
      "use strict";

      const TOKEN_KEY = "works/dddit/team-gate-token";
      const BYPASS_KEY = "works/dddit/team-gate-bypass";
      const IS_PROD =
        location.protocol === "https:" && /^works\.mansejin\.com$/i.test(location.hostname);
      const API_BASE = IS_PROD ? "https://works-api.mansejin.com" : "http://localhost:8788";

      const params = new URLSearchParams(location.search);
      const returnUrl = params.get("return") || "/dddit/";
      const safeReturn = returnUrl.startsWith("/dddit/") && !returnUrl.startsWith("//")
        ? returnUrl
        : "/dddit/";

      const form = document.getElementById("gate-form");
      const passcodeInput = document.getElementById("passcode");
      const btn = document.getElementById("btn-login");
      const errorEl = document.getElementById("gate-error");

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add("show");
      }

      async function finishLogin(data) {
        if (data.bypass || data.enabled === false) {
          sessionStorage.setItem(BYPASS_KEY, "1");
          sessionStorage.removeItem(TOKEN_KEY);
        } else if (data.token) {
          sessionStorage.setItem(TOKEN_KEY, data.token);
          sessionStorage.removeItem(BYPASS_KEY);
        }
        location.replace(safeReturn);
      }

      async function tryExistingSession() {
        if (!IS_PROD) {
          sessionStorage.setItem(BYPASS_KEY, "1");
          location.replace(safeReturn);
          return;
        }

        try {
          const statusRes = await fetch(`${API_BASE}/api/dddit/team-gate/status`);
          const status = await statusRes.json();
          if (!status.enabled) {
            await finishLogin({ enabled: false, bypass: true });
            return;
          }
        } catch {
          showError("서버에 연결하지 못했습니다. works-api 상태를 확인하세요.");
          return;
        }

        const token = sessionStorage.getItem(TOKEN_KEY);
        if (!token) return;

        try {
          const res = await fetch(`${API_BASE}/api/dddit/team-gate/verify`, {
            headers: { "X-Dddit-Team-Token": token },
          });
          if (res.ok) location.replace(safeReturn);
          else sessionStorage.removeItem(TOKEN_KEY);
        } catch {
          /* stay on gate */
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.classList.remove("show");
        btn.disabled = true;
        try {
          const res = await fetch(`${API_BASE}/api/dddit/team-gate/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ passcode: passcodeInput.value }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError(data.detail || "비밀번호가 올바르지 않습니다.");
            return;
          }
          await finishLogin(data);
        } catch {
          showError("로그인 요청에 실패했습니다. works-api 연결을 확인하세요.");
        } finally {
          btn.disabled = false;
        }
      });

      tryExistingSession();
    })();
  </script>
</body>
</html>
