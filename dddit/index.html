<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="디디딧 채널 워크스페이스" />
  <link rel="canonical" href="https://works.mansejin.com/dddit/" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <title>디디딧 워크스페이스</title>
  <style>html.team-gate-pending body { visibility: hidden; }</style>
  <script src="js/team-gate.js"></script>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --header-bg: #0f172a;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
      --success: #16a34a;
      --warn: #d97706;
      --yt-red: #ff0000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding: 20px 20px 48px;
    }

    .page { max-width: 1200px; margin: 0 auto; }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .app-brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .app-brand p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .dashboard {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .dash-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }

    .block-head h2 {
      font-size: 0.92rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .block-icon { font-size: 1rem; }

    .block-body { padding: 14px 16px; }
    .block-body.compact { padding: 12px 14px; }

    .block-link {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }

    .block-link:hover { text-decoration: underline; }

    .block-head-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* YouTube panel */
    .yt-panel .block-body { padding: 14px 16px 16px; }

    .yt-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .yt-stat {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafbfc;
    }

    .yt-stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .yt-stat-value {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .yt-stat-value.loading {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .yt-videos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .yt-video {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }

    .yt-video iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
    }

    .yt-video-caption {
      display: block;
      padding: 6px 8px 8px;
      font-size: 0.72rem;
      line-height: 1.35;
      color: var(--text);
      text-decoration: none;
      background: #fff;
      border-top: 1px solid var(--border);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .yt-video-caption:hover { color: var(--accent); }

    .yt-video-placeholder {
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .yt-error {
      padding: 12px;
      border-radius: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 0.82rem;
      margin-bottom: 12px;
    }

    /* Overview */
    .overview-text {
      min-height: 56px;
      max-height: 120px;
      overflow-y: auto;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .overview-text:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .overview-text:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
    }

    /* Projects & tools */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .link-card {
      display: block;
      padding: 14px 14px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      background: #fafbfc;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .link-card:hover {
      border-color: #93c5fd;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.08);
      transform: translateY(-1px);
    }

    .link-card h3 {
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .link-card p {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .link-card .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
    }

    .link-card.is-ready {
      background: var(--accent-soft);
      border-color: #bfdbfe;
    }

    .project-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .project-pill {
      display: inline-block;
      align-self: flex-start;
      padding: 5px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #bfdbfe;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      text-decoration: none;
    }

    .project-pill:hover { background: #dbeafe; }

    button.project-pill {
      border: 1px solid #bfdbfe;
      cursor: pointer;
      font: inherit;
    }

    button.project-pill.copied {
      background: #dcfce7;
      border-color: #86efac;
      color: #15803d;
    }

    .card-status {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 8px;
    }

    /* Timeline compact */
    .timeline { display: grid; gap: 6px; }

    .timeline-item {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fafbfc;
      font-size: 0.82rem;
    }

    .timeline-date {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
    }

    .timeline-type {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .timeline-title { font-weight: 600; }
    .timeline-sub { font-size: 0.75rem; color: var(--text-muted); }

    .pill {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .pill-todo { background: #f1f5f9; color: #475569; }
    .pill-active { background: #dbeafe; color: #1d4ed8; }
    .pill-done { background: #dcfce7; color: #15803d; }
    .pill-hold { background: #ffedd5; color: #c2410c; }

    .empty-hint {
      padding: 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* Work tabs */
    .work-panel .block-body { padding: 0; }

    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
      overflow-x: auto;
    }

    .tab-btn {
      border: none;
      background: transparent;
      padding: 12px 18px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--surface);
    }

    .tab-pane { display: none; padding: 14px 16px; }
    .tab-pane.active { display: block; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 8px 6px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      background: #fafbfc;
    }

    tr:last-child td { border-bottom: none; }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 7px;
      font: inherit;
      font-size: 0.82rem;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .row-actions { width: 32px; text-align: center; }

    .btn-icon {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
    }

    .btn-icon:hover { background: #fee2e2; color: #b91c1c; }

    .btn-add {
      margin-top: 10px;
      border: 1px dashed var(--border-strong);
      background: #fafbfc;
      color: var(--text-muted);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      width: 100%;
    }

    .btn-add:hover { border-color: var(--accent); color: var(--accent); }

    .notice-list { display: grid; gap: 10px; }

    .notice-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #fafbfc;
    }

    .notice-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .pin-check {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .notice-date { max-width: 140px; margin-left: auto; }

    .notice-title {
      width: 100%;
      font-weight: 700;
      margin-bottom: 6px;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 5px 0;
      background: transparent;
    }

    .notice-title:focus { box-shadow: none; border-color: var(--accent); }

    .notice-card textarea { resize: vertical; min-height: 60px; }

    .help-note {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--accent-soft);
      border: 1px solid #bfdbfe;
      font-size: 0.78rem;
      color: #1e40af;
      line-height: 1.5;
    }

    @media (max-width: 960px) {
      .dash-row { grid-template-columns: 1fr; }
      .yt-videos { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      body { padding: 14px 12px 36px; }
      .yt-stats { grid-template-columns: 1fr; }
      .yt-videos { grid-template-columns: 1fr; }
      .timeline-item { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="app-header">
      <div class="app-brand">
        <h1>디디딧 워크스페이스</h1>
        <p>채널 현황 · 프로젝트 · 팀 업무</p>
      </div>
    </header>

    <div class="dashboard">
      <section class="block yt-panel" id="yt-panel">
        <div class="block-head">
          <h2><span class="block-icon">▶</span> <span id="yt-channel-title">디디딧 YouTube</span></h2>
          <div class="block-head-actions">
            <a class="block-link" href="report/">자세히 보기 →</a>
            <a class="block-link" id="yt-channel-link" href="https://www.youtube.com/@DD-DIT" target="_blank" rel="noopener">@DD-DIT 열기 →</a>
          </div>
        </div>
        <div class="block-body">
          <div id="yt-error" class="yt-error" hidden></div>
          <div class="yt-stats">
            <div class="yt-stat">
              <div class="yt-stat-label">구독자</div>
              <div class="yt-stat-value loading" id="yt-subs">불러오는 중…</div>
            </div>
            <div class="yt-stat">
              <div class="yt-stat-label">총 조회수</div>
              <div class="yt-stat-value loading" id="yt-views">불러오는 중…</div>
            </div>
            <div class="yt-stat">
              <div class="yt-stat-label">영상 수</div>
              <div class="yt-stat-value loading" id="yt-videos-count">불러오는 중…</div>
            </div>
          </div>
          <div class="yt-videos" id="yt-videos"></div>
        </div>
      </section>

      <div class="dash-row">
        <section class="block">
          <div class="block-head">
            <h2><span class="block-icon">📡</span> 채널 소개</h2>
          </div>
          <div class="block-body compact">
            <div
              id="overview-text"
              class="overview-text"
              contenteditable="true"
              data-placeholder="채널 방향, 운영 원칙 등을 입력하세요."
            ></div>
          </div>
        </section>

        <section class="block">
          <div class="block-head">
            <h2><span class="block-icon">🗓</span> 다가오는 일정</h2>
          </div>
          <div class="block-body compact">
            <div id="timeline" class="timeline"></div>
          </div>
        </section>
      </div>

      <div class="dash-row">
        <section class="block">
          <div class="block-head">
            <h2><span class="block-icon">📂</span> 프로젝트</h2>
          </div>
          <div class="block-body compact">
            <div id="project-grid" class="link-grid"></div>
          </div>
        </section>

        <section class="block">
          <div class="block-head">
            <h2><span class="block-icon">🛠</span> 채널 도구</h2>
          </div>
          <div class="block-body compact">
            <div id="tool-grid" class="link-grid"></div>
          </div>
        </section>
      </div>
    </div>

    <section class="block work-panel">
      <div class="tab-bar" role="tablist">
        <button type="button" class="tab-btn active" data-tab="schedule" role="tab">일정</button>
        <button type="button" class="tab-btn" data-tab="sponsorships" role="tab">협찬 · 광고</button>
        <button type="button" class="tab-btn" data-tab="notices" role="tab">노티스</button>
      </div>

      <div class="tab-pane active" data-tab="schedule" role="tabpanel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>구분</th>
                <th>작업</th>
                <th>프로젝트</th>
                <th>담당</th>
                <th>상태</th>
                <th>메모</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
        <button type="button" class="btn-add" data-action="add" data-block="schedule">+ 일정 추가</button>
      </div>

      <div class="tab-pane" data-tab="sponsorships" role="tabpanel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>브랜드</th>
                <th>유형</th>
                <th>상태</th>
                <th>담당자</th>
                <th>마감</th>
                <th>프로젝트</th>
                <th>메모</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="sponsorship-body"></tbody>
          </table>
        </div>
        <button type="button" class="btn-add" data-action="add" data-block="sponsorships">+ 협업 추가</button>
      </div>

      <div class="tab-pane" data-tab="notices" role="tabpanel">
        <div id="notice-list" class="notice-list"></div>
        <button type="button" class="btn-add" data-action="add" data-block="notices">+ 노티스 추가</button>
      </div>
    </section>

    <p class="help-note" id="help-note">
      팀 공유 데이터는 works-api 서버에 자동 저장됩니다.
    </p>
  </div>

  <script src="js/hub.js?v=6"></script>
</body>
</html>
