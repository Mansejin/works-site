<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>스타일 앵커 컨펌 · 디디딧</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #f8fafc;
      --card: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #1d4ed8;
      --accent-soft: #eff6ff;
      --ok: #15803d;
      --ok-soft: #dcfce7;
      --warn: #b45309;
      --warn-soft: #fef3c7;
      --diff-ins: #fef08a;
      --diff-del: #fecaca;
      --group: #f1f5f9;
      --memo-bg: #fffbeb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Pretendard, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .top {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
      color: #fff;
      padding: 28px 24px 32px;
    }
    .top .wrap { max-width: 1200px; margin: 0 auto; }
    .top .badge {
      display: inline-block;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(255,255,255,.18);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .top h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .top p { font-size: .92rem; opacity: .92; max-width: 720px; }
    .layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .nav { position: static !important; }
      .section-grid { grid-template-columns: 1fr !important; }
    }
    .nav {
      position: sticky;
      top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: .82rem;
    }
    .nav h2 { font-size: .78rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
    .nav a {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 2px;
    }
    .nav a:hover { background: var(--group); }
    .nav a.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .nav .flags { font-size: .7rem; color: var(--warn); margin-left: 2px; }
    .summary {
      background: var(--warn-soft);
      border: 1px solid #fcd34d;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 20px;
      font-size: .9rem;
    }
    .summary strong { color: var(--warn); }
    .progress {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .progress .bar-wrap { flex: 1; min-width: 160px; }
    .progress .bar {
      height: 8px;
      background: var(--group);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress .bar-fill { height: 100%; background: var(--ok); border-radius: 4px; transition: width .2s; }
    .progress .count { font-size: .85rem; color: var(--muted); }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      font: inherit;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.small { padding: 4px 10px; font-size: .78rem; }
    .group-title {
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .group-title:first-child { margin-top: 0; }
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section.ok { border-color: #86efac; }
    .section.edited { border-color: #fcd34d; box-shadow: 0 0 0 1px #fef08a; }
    .section.has-memo { border-right: 3px solid #fbbf24; }
    .section-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .section-head input { margin-top: 4px; width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .section-head .meta { flex: 1; }
    .section-head h3 { font-size: .95rem; font-weight: 600; }
    .section-head .tag {
      display: inline-block;
      font-size: .72rem;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 4px;
      margin-right: 4px;
    }
    .section-head .badge-edit {
      font-size: .7rem;
      color: var(--warn);
      background: var(--warn-soft);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .section-grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 0;
      align-items: stretch;
    }
    .section-main {
      padding: 14px 16px 16px 46px;
      border-right: 1px solid var(--border);
    }
    .section-memo {
      padding: 14px 12px 16px;
      background: var(--memo-bg);
    }
    .section-memo label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--warn);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }
    .diff-box {
      margin-bottom: 10px;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .diff-box-head {
      font-size: .72rem;
      font-weight: 600;
      color: var(--warn);
      padding: 6px 10px;
      background: var(--warn-soft);
      border-bottom: 1px solid #fcd34d;
    }
    .diff-lines { font-size: .86rem; line-height: 1.7; }
    .diff-line { padding: 2px 10px; white-space: pre-wrap; word-break: break-word; }
    .diff-line.diff-same { color: #334155; }
    .diff-line.diff-del {
      background: var(--diff-del);
      color: #991b1b;
      text-decoration: line-through;
      opacity: .85;
    }
    .diff-line.diff-ins {
      background: var(--diff-ins);
      color: #713f12;
      font-weight: 500;
    }
    .section-editor {
      width: 100%;
      min-height: 120px;
      font: inherit;
      font-size: .88rem;
      line-height: 1.75;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: vertical;
      color: #334155;
      background: var(--group);
    }
    .section-editor:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .section-toolbar {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .section-toolbar .hint { font-size: .75rem; color: var(--muted); }
    .memo-input {
      width: 100%;
      min-height: 100px;
      font: inherit;
      font-size: .82rem;
      line-height: 1.55;
      padding: 10px;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      resize: vertical;
      background: #fff;
      color: #334155;
    }
    .memo-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(251,191,36,.25);
    }
    .memo-input::placeholder { color: #a8a29e; }
    .section-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
      margin-bottom: 8px;
    }
    .section-body th, .section-body td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
    }
    .section-body th { background: var(--group); font-weight: 600; }
    .footer-note {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .footer-note a { color: var(--accent); }
    .done-banner {
      display: none;
      background: var(--ok-soft);
      border: 1px solid #86efac;
      color: var(--ok);
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .done-banner.show { display: block; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .legend i {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,.08);
    }
    .legend .lg-ins { background: var(--diff-ins); }
    .legend .lg-del { background: var(--diff-del); }
    .legend .lg-memo { background: var(--memo-bg); border-color: #fcd34d; }
  </style>
  <style>html.team-gate-pending body { visibility: hidden; }</style>
  <script src="/dddit/js/team-gate.js"></script>
</head>
<body>
  <header class="top">
    <div class="wrap">
      <span class="badge">컨펌 요청 · 2026-07</span>
      <h1>디디딧 대본 스타일 앵커</h1>
      <p>본문을 직접 수정하면 변경 줄이 노란색으로 표시됩니다. 우측 메모란에 의견을 남겨 주세요. 체크·메모·수정은 브라우저에 저장됩니다.</p>
    </div>
  </header>

  <div class="layout">
    <nav class="nav" id="nav"></nav>

    <main>
      <div class="summary">
        <strong>확인 부탁드립니다.</strong> 톤 가이드 검토 후 체크해 주세요. 문장 수정이 필요하면 왼쪽 본문을 편집하고, 우측에 메모를 남겨 주세요.
      </div>

      <div class="legend">
        <span><i class="lg-ins"></i> 추가·변경된 줄</span>
        <span><i class="lg-del"></i> 삭제된 줄</span>
        <span><i class="lg-memo"></i> 메모 있음</span>
      </div>

      <div class="done-banner" id="done-banner">전체 섹션 컨펌 완료 — 감사합니다.</div>

      <div class="progress">
        <div class="bar-wrap">
          <div class="count" id="progress-text">0 / 0 확인</div>
          <div class="bar"><div class="bar-fill" id="progress-bar" style="width:0%"></div></div>
        </div>
        <div class="btns">
          <button type="button" id="btn-all">전체 확인</button>
          <button type="button" id="btn-reset">초기화</button>
          <button type="button" class="primary" id="btn-copy">요약 복사</button>
        </div>
      </div>

      <div id="sections"></div>

      <p class="footer-note">
        라운드업(N개 아이템) 포맷은 별도: <a href="style-anchor.html#roundup-note">하단 참고</a> ·
        <a href="index.html">대본 QC 도구</a>
      </p>
    </main>
  </div>

  <script src="style-anchor-view.js"></script>
</body>
</html>
