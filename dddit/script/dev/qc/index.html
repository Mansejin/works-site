<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>대본 QC (개발 전용) · 디디딧</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; --ok:#16a34a; --accent:#2563eb; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Pretendard, sans-serif; background:var(--bg); color:var(--text); line-height:1.55; padding:24px; }
    .wrap { max-width:960px; margin:0 auto; }
    h1 { font-size:1.35rem; margin-bottom:4px; }
    .sub { color:var(--muted); font-size:.88rem; margin-bottom:20px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:16px; }
    .card h2 { font-size:1rem; margin-bottom:12px; }
    label { display:block; font-size:.85rem; font-weight:600; margin-bottom:6px; }
    select, textarea { width:100%; font:inherit; border:1px solid var(--border); border-radius:8px; padding:10px; }
    textarea { min-height:200px; resize:vertical; font-size:.9rem; }
    .row { display:grid; gap:12px; grid-template-columns:1fr 1fr; margin-bottom:12px; }
    @media (max-width:640px) { .row { grid-template-columns:1fr; } }
    .check { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
    .check:last-child { border:0; }
    .check input { margin-top:4px; width:18px; height:18px; }
    .check .hint { font-size:.82rem; color:var(--muted); margin-top:2px; }
    .btns { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    button { font:inherit; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:#fff; cursor:pointer; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .status { padding:10px 12px; border-radius:8px; font-size:.88rem; margin-top:12px; }
    .status.pass { background:#dcfce7; color:#166534; }
    .status.fail { background:#fef3c7; color:#92400e; }
    .chapters { font-size:.88rem; color:var(--muted); }
    .chapters li { margin:4px 0 4px 18px; }
    pre { font-size:.78rem; background:#f8fafc; padding:12px; border-radius:8px; overflow:auto; white-space:pre-wrap; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>대본 QC</h1>
    <p class="sub">개발 전용 — 콘티 작성기에 링크하지 않음 · <a href="README.md">README</a> · <a href="style-anchor.html">스타일 앵커 컨펌</a></p>

    <div class="card">
      <h2>1. 포맷 · 체크리스트</h2>
      <div class="row">
        <div>
          <label for="format">영상 포맷</label>
          <select id="format">
            <option value="sponsored-review">협찬·심층 리뷰</option>
            <option value="item-roundup">N개 아이템 라운드업</option>
          </select>
        </div>
        <div>
          <label for="category">카테고리 (챕터 구성)</label>
          <select id="category"></select>
        </div>
      </div>
      <p id="format-desc" class="chapters"></p>
      <ul id="chapter-list" class="chapters"></ul>
    </div>

    <div class="card">
      <h2>2. 검수 대본</h2>
      <label for="prose">줄글 또는 아이템 블록 붙여넣기</label>
      <textarea id="prose" placeholder="실사용 챕터 줄글 또는 [제품명] 블록…"></textarea>
      <div class="btns">
        <button type="button" id="btn-sample-roundup">라운드업 샘플 (다이소·오프닝+3개)</button>
        <button type="button" id="btn-sample-tone">톤 앵커 예시</button>
        <button type="button" id="btn-clear">비우기</button>
      </div>
    </div>

    <div class="card">
      <h2>3. 체크리스트</h2>
      <div id="checklist"></div>
      <div id="qc-status" class="status fail" hidden></div>
      <div class="btns">
        <button type="button" class="primary" id="btn-export-tone" disabled>톤 앵커로 복사</button>
        <button type="button" id="btn-export-roundup" disabled>라운드업 포맷 앵커로 복사</button>
      </div>
      <p class="sub" style="margin-top:10px">Pass 후 수동 반영: <code>prompts/style-anchor.txt</code> 또는 <code>dev/qc/anchors/</code></p>
    </div>

    <div class="card">
      <h2>참고 앵커</h2>
      <pre id="anchor-preview"></pre>
    </div>
  </div>
  <script src="qc.js"></script>
</body>
</html>
