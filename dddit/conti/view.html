<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <title>콘티 보기 · 디디딧</title>
  <style>html.team-gate-pending body { visibility: hidden; }</style>
  <script src="../js/team-gate.js"></script>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --header-bg: #0f172a;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding: 32px 20px 48px;
    }

    .page { max-width: 1100px; margin: 0 auto; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--header-bg);
      color: #f8fafc;
      padding: 22px 24px;
    }

    .card-header h1 { font-size: 1.35rem; font-weight: 700; }
    .card-header p { color: #cbd5e1; font-size: 0.88rem; margin-top: 6px; }

    .status-bar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-muted);
      background: #fafbfc;
    }

    .status-bar.error {
      background: #fef2f2;
      color: #b91c1c;
      border-color: #fecaca;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }

    td.col-script, td.col-scene, td.col-caption, td.col-note { white-space: pre-wrap; }
    td.col-size { width: 72px; text-align: center; }
    td.col-note { color: var(--text-muted); }

    .empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-header">
        <h1 id="page-title">완성 콘티</h1>
        <p>대본 · 장면 · 사이즈 · 자막 · 코멘트 (읽기 전용)</p>
      </div>
      <div id="status-bar" class="status-bar">불러오는 중…</div>
      <div class="table-wrap">
        <table id="conti-table" hidden>
          <thead>
            <tr>
              <th>#</th>
              <th>대본</th>
              <th>장면</th>
              <th>사이즈</th>
              <th>자막</th>
              <th>코멘트</th>
            </tr>
          </thead>
          <tbody id="conti-body"></tbody>
        </table>
        <div id="conti-empty" class="empty" hidden>등록된 콘티가 없습니다.</div>
      </div>
    </div>
  </div>

  <script src="../js/conti-api.js"></script>
  <script>
    (function () {
      const api = window.DdditContiApi;
      const project = (new URLSearchParams(location.search).get("project") || "").trim().toLowerCase();

      const pageTitle = document.getElementById("page-title");
      const statusBar = document.getElementById("status-bar");
      const table = document.getElementById("conti-table");
      const tbody = document.getElementById("conti-body");
      const emptyEl = document.getElementById("conti-empty");

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderRows(rows) {
        if (!rows.length) {
          table.hidden = true;
          emptyEl.hidden = false;
          return;
        }

        tbody.innerHTML = rows
          .map(
            (row, i) => `
          <tr>
            <td>${i + 1}</td>
            <td class="col-script">${esc(row.대본)}</td>
            <td class="col-scene">${esc(row.장면)}</td>
            <td class="col-size">${esc(row.사이즈)}</td>
            <td class="col-caption">${esc(row.자막)}</td>
            <td class="col-note">${esc(row.코멘트)}</td>
          </tr>
        `
          )
          .join("");

        table.hidden = false;
        emptyEl.hidden = true;
      }

      async function load() {
        if (!project) {
          statusBar.textContent = "project 파라미터가 필요합니다.";
          statusBar.classList.add("error");
          return;
        }

        try {
          const data = await api.load(project);
          const label = data.title || project;
          pageTitle.textContent = label;
          document.title = `${label} · 콘티 · 디디딧`;
          statusBar.textContent = `${data.rows.length}행 · 읽기 전용`;
          renderRows(data.rows);
        } catch {
          statusBar.textContent = "콘티를 불러오지 못했습니다.";
          statusBar.classList.add("error");
        }
      }

      load();
    })();
  </script>
</body>
</html>
