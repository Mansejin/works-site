<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://works.mansejin.com/dddit/xenics/plan/" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <title>기획안 · Xenics · 디디딧</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --header-bg: #0f172a;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      padding: 40px 20px 56px;
    }

    .page { max-width: 920px; margin: 0 auto; }

    .hub-nav { margin-bottom: 16px; }
    .hub-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .hub-nav a:hover { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--header-bg);
      color: #f8fafc;
      padding: 24px 28px;
    }

    .card-header h1 { font-size: 1.4rem; font-weight: 700; }
    .card-header p { color: #cbd5e1; font-size: 0.9rem; margin-top: 6px; }

    .card-body { padding: 28px; }

    .placeholder {
      padding: 32px 24px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="hub-nav"><a href="../">← Xenics 프로젝트</a></nav>
    <div class="card">
      <div class="card-header">
        <h1>기획안</h1>
        <p>콘텐츠 방향 · 일정 · 핵심 메시지</p>
      </div>
      <div class="card-body">
        <div class="placeholder">기획 내용을 여기에 추가할 예정입니다.</div>
      </div>
    </div>
  </div>
</body>
</html>
