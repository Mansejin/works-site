<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://works.mansejin.com/project/tinasinger/mv/ppm/" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="css/deck.css" />
  <title>이겸비 · Right Here, Right Now · MV PPM</title>
</head>
<body>
  <div class="deck-layout" id="deckLayout">
    <div class="deck-stage">
      <div class="deck">
        <div class="slide-frame" id="slideFrame" aria-live="polite"></div>
      </div>

      <div class="nav-zone nav-zone--prev" id="navPrev" aria-label="이전 슬라이드"></div>
      <div class="nav-zone nav-zone--next" id="navNext" aria-label="다음 슬라이드"></div>
    </div>

    <aside class="comments-rail" id="commentsRail" hidden aria-label="슬라이드 댓글">
      <div class="comments-rail-head">
        <div class="comments-rail-title-wrap">
          <h3 class="comments-rail-title">댓글</h3>
          <p class="comments-rail-sub" id="commentsRailSub">슬라이드</p>
        </div>
        <button type="button" class="comments-rail-close" id="btnCommentsClose" aria-label="댓글 닫기">×</button>
      </div>
      <div class="comments-list" id="commentsList"></div>
      <form class="comments-compose" id="commentsForm">
        <input type="text" class="comments-author-input" id="commentAuthor" placeholder="이름" maxlength="24" autocomplete="nickname" />
        <textarea class="comments-body-input" id="commentBody" placeholder="댓글을 입력하세요…" rows="3" maxlength="2000"></textarea>
        <button type="submit" class="deck-btn comments-submit">게시</button>
      </form>
    </aside>
  </div>

  <footer class="deck-ui">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="slide-counter" id="slideCounter"><strong>1</strong> / 1</span>
    <div class="deck-audio">
      <span class="deck-audio-label">Demo Mix</span>
      <audio id="demoMix" controls controlsList="nodownload noplaybackrate" disableRemotePlayback preload="metadata" title="Right Here, Right Now — 초기 믹스"></audio>
    </div>
  <span class="deck-hints" id="deckHints">← → Space · O 개요</span>
    <div class="deck-actions">
      <a class="deck-btn deck-btn--ghost" href="../">← mv</a>
      <span class="save-status" id="saveStatus" hidden>저장됨</span>
      <button type="button" class="deck-btn deck-btn--ghost" id="btnEdit">편집</button>
      <button type="button" class="deck-btn deck-btn--ghost" id="btnExport" title="data/slides.js로 배포할 파일 다운로드" hidden>slides.js 저장</button>
      <button type="button" class="deck-btn deck-btn--ghost" id="btnComments" hidden>
        댓글 <span class="comments-badge" id="commentsBadge" hidden></span>
      </button>
      <button type="button" class="deck-btn" id="btnOverview">개요</button>
      <a class="deck-btn" id="btnCallsheet" href="callsheet/" title="7/25 1회차 일촬표">일촬표</a>
      <button type="button" class="deck-btn" id="btnFullscreen">전체화면</button>
  </footer>

  <div class="overview-panel" id="overviewPanel">
    <h2>슬라이드 개요 — 클릭하여 이동 · Esc 닫기</h2>
    <div class="overview-grid" id="overviewGrid"></div>
  </div>

  <div class="edit-modal" id="editModal" hidden>
    <form class="edit-modal-card" id="editForm">
      <h3 class="edit-modal-title">편집 모드</h3>
      <input type="password" class="edit-modal-input" id="editPassword" placeholder="비밀번호" autocomplete="current-password" required />
      <p class="edit-modal-error" id="editError" hidden>비밀번호가 올바르지 않습니다.</p>
      <div class="edit-modal-actions">
        <button type="button" class="deck-btn deck-btn--ghost" id="editCancel">취소</button>
        <button type="submit" class="deck-btn">입력</button>
      </div>
    </form>
  </div>

  <script src="data/slides.js"></script>
  <script src="js/deck.js"></script>
</body>
</html>
