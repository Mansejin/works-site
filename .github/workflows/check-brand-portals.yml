name: Check brand portals

on:
  push:
    branches: [main]
    paths:
      - "dddit/**"
      - ".github/workflows/check-brand-portals.yml"
  pull_request:
    paths:
      - "dddit/**"
      - ".github/workflows/check-brand-portals.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify brand pages exclude script machine
        run: node dddit/scripts/check-brand-portals.mjs
