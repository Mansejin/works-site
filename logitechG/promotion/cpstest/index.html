<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="SUPERSTRIKE 클릭 챌린지">
    <link rel="canonical" href="https://works.mansejin.com/logitechG/promotion/cpstest/">
    <title>SUPERSTRIKE 클릭 챌린지</title>
    <style>
        /* BrownPro — Latin / English */
        @font-face {
            font-family: 'BrownPro';
            src: url('fonts/BrownPro-Thin.otf') format('opentype');
            font-weight: 100;
            font-style: normal;
            font-display: swap;
            unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
        }

        @font-face {
            font-family: 'BrownPro';
            src: url('fonts/BrownPro-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
        }

        @font-face {
            font-family: 'BrownPro';
            src: url('fonts/BrownPro-Bold.otf') format('opentype');
            font-weight: 700 900;
            font-style: normal;
            font-display: swap;
            unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
        }

        /* Noto Sans KR — Korean */
        @font-face {
            font-family: 'Noto Sans KR';
            src: url('fonts/NotoSansCJKkr-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
        }

        @font-face {
            font-family: 'Noto Sans KR';
            src: url('fonts/NotoSansCJKkr-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
            unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
        }

        @font-face {
            font-family: 'Noto Sans KR';
            src: url('fonts/NotoSansCJKkr-Black.otf') format('opentype');
            font-weight: 900;
            font-style: normal;
            font-display: swap;
            unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
        }

        :root {
            --logi-blue: #00B8FC;
            --bg-color: #000000;
            --text-color: #ffffff;
            --panel-bg: #141414;
            --font-brand: 'BrownPro', 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-brand);
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100vw;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #mainScreen {
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 70px 20px 50px 20px;
            background: #000000 url('main-bg.jpg') no-repeat center center;
            background-size: cover;
        }

        .main-header {
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-size: 54px;
            font-weight: 900;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .main-subtitle {
            font-size: 18px;
            font-weight: 400;
            color: #cccccc;
            line-height: 1.6;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .main-bottom-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .start-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            padding: 20px 100px;
            font-size: 26px;
            font-weight: 700;
            border-radius: 45px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            letter-spacing: 6px;
            text-indent: 6px;
            outline: none;
            margin-bottom: 35px;
        }

        .start-btn:hover {
            background: rgba(0, 184, 252, 0.08);
            border-color: var(--logi-blue);
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 184, 252, 0.35);
            transform: translateY(-2px);
        }

        .main-brand-logo {
            height: 60px;
            object-fit: contain;
        }

        #gameScreen {
            align-items: center;
            justify-content: center;
            background-color: #080808;
            overflow-y: auto;
            padding: 20px 0;
        }

        .game-container {
            width: 90%;
            max-width: 600px;
            background-color: var(--panel-bg);
            padding: 45px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            border: 1px solid #1f1f1f;
            box-sizing: border-box;
        }

        .game-logo {
            height: 65px;
            margin-bottom: 25px;
            object-fit: contain;
        }

        .event-title {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .event-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 35px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 700;
        }

        .stat-box {
            background: #090909;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #202020;
            width: 42%;
        }

        .stat-box span {
            display: block;
            font-size: 12px;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .click-area {
            background-color: #1a1a1a;
            border: 2px dashed var(--logi-blue);
            border-radius: 12px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            touch-action: none;
        }

        .click-area:active {
            background-color: var(--logi-blue);
            color: #000;
            transform: scale(0.98);
        }

        .click-area.countdown-active:active {
            background-color: #1a1a1a;
            color: #fff;
            transform: none;
            cursor: default;
        }

        .cps-panel {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #1f1f1f;
            text-align: left;
        }

        .cps-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 12px;
        }

        .cps-panel-title {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cps-live-group {
            display: flex;
            gap: 16px;
            align-items: baseline;
        }

        .cps-live-item {
            text-align: right;
        }

        .cps-live-label {
            display: block;
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .cps-live-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--logi-blue);
            line-height: 1;
        }

        .cps-live-value.dim {
            color: #888;
            font-size: 16px;
        }

        .cps-chart-wrap {
            background: #090909;
            border: 1px solid #202020;
            border-radius: 8px;
            padding: 10px 8px 6px;
        }

        #cpsChart {
            width: 100%;
            height: 130px;
            display: block;
        }

        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .result-box {
            background: var(--panel-bg);
            padding: 45px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid var(--logi-blue);
            box-shadow: 0 0 50px rgba(0, 184, 252, 0.25);
            max-width: 480px;
            width: 85%;
        }

        .result-box h2 {
            color: var(--logi-blue);
            font-size: 38px;
            margin-top: 0;
            margin-bottom: 6px;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .result-record-subtitle {
            color: #888888;
            font-size: 15px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .final-score {
            font-size: 64px;
            font-weight: 900;
            margin: 15px 0;
            color: #fff;
        }

        .result-chart-wrap {
            background: #090909;
            border: 1px solid #202020;
            border-radius: 8px;
            padding: 10px 8px 6px;
            margin: 0 0 20px;
        }

        #resultChart {
            width: 100%;
            height: 100px;
            display: block;
        }

        .auto-return-note {
            margin: 0 0 20px;
            font-size: 14px;
            color: #888;
        }

        .auto-return-note span {
            color: var(--logi-blue);
            font-weight: 700;
        }

        .result-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .result-btn {
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 180px;
            box-sizing: border-box;
            font-family: var(--font-brand);
        }

        .retry-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .retry-btn:hover {
            border-color: var(--logi-blue);
            color: var(--logi-blue);
            box-shadow: 0 0 16px rgba(0, 184, 252, 0.25);
        }

        .main-btn {
            background-color: var(--logi-blue);
            color: #000000;
        }

        .main-btn:hover {
            background-color: #0098d1;
            box-shadow: 0 0 20px rgba(0, 184, 252, 0.6);
        }

        @media (max-width: 640px) {
            .main-title {
                font-size: 32px;
            }

            .main-subtitle {
                font-size: 15px;
            }

            .start-btn {
                padding: 16px 48px;
                font-size: 20px;
                letter-spacing: 4px;
                text-indent: 4px;
            }

            .main-brand-logo {
                height: 40px;
            }

            .game-container {
                padding: 30px 20px;
            }

            .event-title {
                font-size: 22px;
            }

            .stats {
                font-size: 20px;
            }

            .final-score {
                font-size: 44px;
            }

            .cps-live-value {
                font-size: 18px;
            }

            .result-btn {
                font-size: 14px;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <div id="mainScreen" class="screen active">
        <div class="main-header">
            <h1 class="main-title">SUPERSTRIKE 클릭 챌린지</h1>
            <p class="main-subtitle">10초 동안 가장 많은 클릭을 하신 1분께<br>PRO X2 SUPERSTRIKE를 드립니다!</p>
        </div>

        <div class="main-bottom-area">
            <button class="start-btn" onclick="goToGame()">도전하기</button>
            <img src="Logitech_G_Horizontal_Logo_Digital_Cyan_2.png" alt="Logitech G" class="main-brand-logo">
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="game-container">
            <img src="Logitech_G_Horizontal_Logo_Digital_Cyan_2.png" alt="Logitech G" class="game-logo">

            <div class="event-title">SUPERSTRIKE 클릭 챌린지</div>
            <div class="event-subtitle">지슈스 마우스로 경험하는 최상의 한계 속도 테스트</div>

            <div class="stats">
                <div class="stat-box">
                    <span>Time Left</span>
                    <div id="timeDisplay" style="color: #fff;">10.00</div>
                </div>
                <div class="stat-box">
                    <span>Clicks</span>
                    <div id="clickDisplay" style="color: var(--logi-blue);">0</div>
                </div>
            </div>

            <div class="click-area" id="clickArea">
                여기를 클릭하여 대기
            </div>

            <div class="cps-panel">
                <div class="cps-panel-header">
                    <div class="cps-panel-title">실시간 CPS 차트</div>
                    <div class="cps-live-group">
                        <div class="cps-live-item">
                            <span class="cps-live-label">현재 CPS</span>
                            <span class="cps-live-value" id="liveCps">0.0</span>
                        </div>
                        <div class="cps-live-item">
                            <span class="cps-live-label">평균 CPS</span>
                            <span class="cps-live-value dim" id="avgCps">0.0</span>
                        </div>
                    </div>
                </div>
                <div class="cps-chart-wrap">
                    <canvas id="cpsChart" aria-label="실시간 CPS 차트"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <h2>TIME OVER</h2>
            <div class="result-record-subtitle">SUPERSTRIKE 클릭 챌린지 기록</div>

            <div class="final-score"><span id="finalClicks">0</span>회 클릭</div>
            <p style="color: #aaa; font-size: 20px; margin: 5px 0 20px 0;">초당 클릭 수 (CPS) : <span id="finalCps" style="color: var(--logi-blue); font-weight: bold;">0</span></p>

            <div class="result-chart-wrap">
                <canvas id="resultChart" aria-label="CPS 기록 차트"></canvas>
            </div>

            <p class="auto-return-note"><span id="autoReturnCount">10</span>초 후 메인 화면으로 이동합니다</p>

            <div class="result-buttons">
                <button class="result-btn retry-btn" id="retryBtn" onclick="retryGame()">재도전</button>
                <button class="result-btn main-btn" id="mainBtn" onclick="goToMain()">메인 화면으로</button>
            </div>
        </div>
    </div>

    <script>
        const timeLimit = 10;
        const AUTO_RETURN_SECONDS = 10;
        const SECOND_BUCKETS = 10;

        let clicks = 0;
        let timeLeft = timeLimit;
        let timer = null;
        let countdownTimer = null;
        let resultShowTimer = null;
        let autoReturnInterval = null;
        let gameStartTime = 0;
        let autoReturnLeft = AUTO_RETURN_SECONDS;
        let clickTimestamps = [];

        let isCountingDown = false;
        let isGaming = false;
        let isFinished = false;

        const clickArea = document.getElementById('clickArea');
        const clickDisplay = document.getElementById('clickDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const resultOverlay = document.getElementById('resultOverlay');
        const finalClicks = document.getElementById('finalClicks');
        const finalCps = document.getElementById('finalCps');
        const liveCpsEl = document.getElementById('liveCps');
        const avgCpsEl = document.getElementById('avgCps');
        const autoReturnCount = document.getElementById('autoReturnCount');
        const cpsChart = document.getElementById('cpsChart');
        const resultChart = document.getElementById('resultChart');
        const cpsCtx = cpsChart.getContext('2d');
        const resultCtx = resultChart.getContext('2d');

        function clearAllTimers() {
            if (timer !== null) {
                clearInterval(timer);
                timer = null;
            }
            if (countdownTimer !== null) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            if (resultShowTimer !== null) {
                clearTimeout(resultShowTimer);
                resultShowTimer = null;
            }
            clearAutoReturn();
        }

        function clearAutoReturn() {
            if (autoReturnInterval !== null) {
                clearInterval(autoReturnInterval);
                autoReturnInterval = null;
            }
        }

        function getElapsedSeconds() {
            if (!gameStartTime) return 0;
            return Math.min(timeLimit, (performance.now() - gameStartTime) / 1000);
        }

        function getClickBuckets() {
            const buckets = new Array(SECOND_BUCKETS).fill(0);
            for (const t of clickTimestamps) {
                const idx = Math.min(Math.floor(t), SECOND_BUCKETS - 1);
                if (idx >= 0) buckets[idx]++;
            }
            return buckets;
        }

        function getCurrentSecondCps() {
            if (!isGaming && !isFinished) return 0;
            const elapsed = getElapsedSeconds();
            const currentIdx = Math.min(Math.floor(elapsed), SECOND_BUCKETS - 1);
            const bucketStart = currentIdx;
            const count = clickTimestamps.filter((t) => t >= bucketStart && t < bucketStart + 1).length;
            return count;
        }

        function getAverageCps() {
            const elapsed = getElapsedSeconds();
            if (elapsed <= 0) return 0;
            return clicks / elapsed;
        }

        function setupCanvas(canvas, ctx) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { width: rect.width, height: rect.height };
        }

        function drawCpsChart(canvas, ctx, options) {
            const { highlightCurrent = false, elapsedOverride = null } = options;
            const size = setupCanvas(canvas, ctx);
            const width = size.width;
            const height = size.height;
            const padding = { top: 8, right: 8, bottom: 22, left: 28 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            const buckets = getClickBuckets();
            const maxValue = Math.max(1, ...buckets);
            const barGap = 6;
            const barWidth = (chartWidth - barGap * (SECOND_BUCKETS - 1)) / SECOND_BUCKETS;
            const elapsed = elapsedOverride !== null ? elapsedOverride : getElapsedSeconds();
            const currentIdx = Math.min(Math.floor(elapsed), SECOND_BUCKETS - 1);

            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = '#252525';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 3; i++) {
                const y = padding.top + (chartHeight / 3) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            for (let i = 0; i < SECOND_BUCKETS; i++) {
                const value = buckets[i];
                const barHeight = (value / maxValue) * chartHeight;
                const x = padding.left + i * (barWidth + barGap);
                const y = padding.top + chartHeight - barHeight;
                const isCurrent = highlightCurrent && i === currentIdx && isGaming;

                ctx.fillStyle = isCurrent ? '#00B8FC' : (value > 0 ? 'rgba(0, 184, 252, 0.55)' : '#1a1a1a');
                ctx.fillRect(x, y, barWidth, barHeight);

                ctx.fillStyle = '#555';
                ctx.font = '10px BrownPro, Noto Sans KR, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(String(i + 1), x + barWidth / 2, height - 6);

                if (value > 0) {
                    ctx.fillStyle = isCurrent ? '#fff' : '#aaa';
                    ctx.font = 'bold 10px BrownPro, Noto Sans KR, sans-serif';
                    ctx.fillText(String(value), x + barWidth / 2, Math.max(padding.top + 10, y - 4));
                }
            }

            ctx.fillStyle = '#666';
            ctx.font = '10px BrownPro, Noto Sans KR, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(String(maxValue), padding.left - 6, padding.top + 8);
        }

        function updateLiveStats() {
            liveCpsEl.textContent = getCurrentSecondCps().toFixed(1);
            avgCpsEl.textContent = getAverageCps().toFixed(1);
            drawCpsChart(cpsChart, cpsCtx, { highlightCurrent: true });
        }

        function resetChartDisplay() {
            clickTimestamps = [];
            liveCpsEl.textContent = '0.0';
            avgCpsEl.textContent = '0.0';
            drawCpsChart(cpsChart, cpsCtx, { highlightCurrent: false, elapsedOverride: 0 });
        }

        function startAutoReturnCountdown() {
            clearAutoReturn();
            autoReturnLeft = AUTO_RETURN_SECONDS;
            autoReturnCount.textContent = autoReturnLeft;

            autoReturnInterval = setInterval(() => {
                autoReturnLeft -= 1;
                autoReturnCount.textContent = Math.max(autoReturnLeft, 0);
                if (autoReturnLeft <= 0) {
                    goToMain();
                }
            }, 1000);
        }

        function goToGame() {
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            resetGame();
        }

        function goToMain() {
            clearAllTimers();
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.add('active');
            resultOverlay.style.display = 'none';
        }

        function retryGame() {
            clearAllTimers();
            resultOverlay.style.display = 'none';
            resetGame();
        }

        clickArea.addEventListener('pointerdown', function (e) {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            e.preventDefault();
            handleUserClick();
        });

        function handleUserClick() {
            if (isFinished || isCountingDown) return;

            if (!isGaming) {
                startCountdown();
                return;
            }

            clicks++;
            clickTimestamps.push(getElapsedSeconds());
            clickDisplay.textContent = clicks;
            updateLiveStats();
        }

        function startCountdown() {
            clearAllTimers();
            isCountingDown = true;
            clickArea.classList.add('countdown-active');
            let count = 3;

            clickArea.style.fontSize = '80px';
            clickArea.textContent = count;

            countdownTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    clickArea.textContent = count;
                } else {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            isCountingDown = false;
            isGaming = true;
            clickArea.classList.remove('countdown-active');

            clickArea.style.fontSize = '24px';
            clickArea.textContent = '클릭! 클릭! 클릭!';

            gameStartTime = performance.now();
            resetChartDisplay();

            timer = setInterval(() => {
                const elapsed = getElapsedSeconds();
                timeLeft = Math.max(0, timeLimit - elapsed);
                timeDisplay.textContent = timeLeft.toFixed(2);
                updateLiveStats();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 16);
        }

        function endGame() {
            clearAllTimers();
            isGaming = false;
            isFinished = true;
            timeLeft = 0;
            timeDisplay.textContent = '0.00';
            clickArea.textContent = '종료!';

            finalClicks.textContent = clicks;
            finalCps.textContent = (clicks / timeLimit).toFixed(1);
            updateLiveStats();

            resultShowTimer = setTimeout(() => {
                drawCpsChart(resultChart, resultCtx, { highlightCurrent: false, elapsedOverride: timeLimit });
                resultOverlay.style.display = 'flex';
                startAutoReturnCountdown();
            }, 300);
        }

        function resetGame() {
            clearAllTimers();

            clicks = 0;
            timeLeft = timeLimit;
            gameStartTime = 0;
            isCountingDown = false;
            isGaming = false;
            isFinished = false;

            clickDisplay.textContent = '0';
            timeDisplay.textContent = '10.00';
            clickArea.classList.remove('countdown-active');
            clickArea.style.fontSize = '24px';
            clickArea.textContent = '여기를 클릭하여 대기';
            resultOverlay.style.display = 'none';
            autoReturnLeft = AUTO_RETURN_SECONDS;
            autoReturnCount.textContent = AUTO_RETURN_SECONDS;
            resetChartDisplay();
        }

        window.addEventListener('resize', () => {
            drawCpsChart(cpsChart, cpsCtx, { highlightCurrent: isGaming, elapsedOverride: isFinished ? timeLimit : null });
            if (resultOverlay.style.display === 'flex') {
                drawCpsChart(resultChart, resultCtx, { highlightCurrent: false, elapsedOverride: timeLimit });
            }
        });

        resetChartDisplay();
    </script>
</body>
</html>
