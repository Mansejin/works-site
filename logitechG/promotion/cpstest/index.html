<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="description" content="SUPERSTRIKE 클릭 챌린지">
    <link rel="canonical" href="https://works.mansejin.com/logitechG/promotion/cpstest/">
    <title>SUPERSTRIKE 클릭 챌린지</title>
    <style>
        /* BrownPro — Latin / English */
        @font-face {
            font-family: 'BrownPro';
            src: url('fonts/BrownPro-Thin.otf') format('opentype');
            font-weight: 100;
            font-style: normal;
            font-display: swap;
            unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
        }

        @font-face {
            font-family: 'BrownPro';
            src: url('fonts/BrownPro-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
        }

        @font-face {
            font-family: 'BrownPro';
            src: url('fonts/BrownPro-Bold.otf') format('opentype');
            font-weight: 700 900;
            font-style: normal;
            font-display: swap;
            unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
        }

        /* Noto Sans KR — Korean */
        @font-face {
            font-family: 'Noto Sans KR';
            src: url('fonts/NotoSansCJKkr-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
        }

        @font-face {
            font-family: 'Noto Sans KR';
            src: url('fonts/NotoSansCJKkr-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
            unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
        }

        @font-face {
            font-family: 'Noto Sans KR';
            src: url('fonts/NotoSansCJKkr-Black.otf') format('opentype');
            font-weight: 900;
            font-style: normal;
            font-display: swap;
            unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
        }

        :root {
            --logi-blue: #00B8FC;
            --bg-color: #000000;
            --text-color: #ffffff;
            --panel-bg: #141414;
            --font-brand: 'BrownPro', 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-brand);
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100vw;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #mainScreen {
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 70px 20px 50px 20px;
            background: #000000 url('main-bg.jpg') no-repeat center center;
            background-size: cover;
        }

        .main-header {
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-size: 54px;
            font-weight: 900;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .main-subtitle {
            font-size: 18px;
            font-weight: 400;
            color: #cccccc;
            line-height: 1.6;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .main-bottom-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .start-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            padding: 20px 100px;
            font-size: 26px;
            font-weight: 700;
            border-radius: 45px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            letter-spacing: 6px;
            text-indent: 6px;
            outline: none;
            margin-bottom: 22px;
        }

        .start-btn:hover {
            background: rgba(0, 184, 252, 0.08);
            border-color: var(--logi-blue);
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 184, 252, 0.35);
            transform: translateY(-2px);
        }

        .main-brand-logo {
            height: 48px;
            object-fit: contain;
            mix-blend-mode: screen;
        }

        #gameScreen {
            align-items: center;
            justify-content: center;
            background-color: #080808;
            overflow-y: auto;
            padding: 16px 0;
        }

        .game-container {
            width: 90%;
            max-width: 560px;
            background-color: var(--panel-bg);
            padding: 28px 28px 24px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            border: 1px solid #1f1f1f;
            box-sizing: border-box;
        }

        .game-logo {
            height: 40px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .event-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 6px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .event-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 18px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 700;
        }

        .stat-box {
            background: #090909;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #202020;
            width: 48%;
            box-sizing: border-box;
        }

        .stat-box span {
            display: block;
            font-size: 11px;
            color: #555;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .click-area {
            background-color: #1a1a1a;
            border: 2px dashed var(--logi-blue);
            border-radius: 12px;
            height: 180px;

            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;

            touch-action: none;

        .click-area:active {
            background-color: var(--logi-blue);
            color: #000;
            transform: scale(0.98);
        }

        .click-area.countdown-active:active {
            background-color: #1a1a1a;
            color: #fff;
            transform: none;
            cursor: default;
        }

        .cps-panel {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #1f1f1f;
            text-align: left;
        }

        .cps-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 8px;
        }

        .cps-panel-title {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cps-live-group {
            display: flex;
            gap: 16px;
            align-items: baseline;
        }

        .cps-live-item {
            text-align: right;
        }

        .cps-live-label {
            display: block;
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .cps-live-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--logi-blue);
            line-height: 1;
        }

        .cps-live-value.dim {
            color: #888;

        .cps-chart-wrap {
            background: #090909;
            border: 1px solid #202020;
            border-radius: 8px;
            padding: 10px 8px 6px;
        }

        .chart-legend {
            display: flex;
            gap: 14px;
            justify-content: flex-end;
            margin-bottom: 6px;

        .chart-legend-item {

            margin-top: 0;
            margin-bottom: 6px;
            letter-spacing: 2px;

            font-size: 15px;
            font-weight: 700;

            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .final-score {

            font-weight: 900;
            margin: 15px 0;
            color: #fff;
        }

        .result-chart-wrap {
            background: #090909;
            border: 1px solid #202020;
            border-radius: 8px;
            padding: 10px 8px 6px;
            margin: 0 0 20px;
        }

        .auto-return-note {
            margin: 0 0 20px;
            font-size: 14px;
            color: #888;
        }

        .auto-return-note span {
            color: var(--logi-blue);
            font-weight: 700;
        }

        .result-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .result-btn {
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;

            font-family: var(--font-brand);

        .retry-btn {

            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .retry-btn:hover {
            border-color: var(--logi-blue);
            color: var(--logi-blue);

        .main-btn {

            .event-title {

            }

            .event-subtitle {
                margin-bottom: 14px;
            }

            .stats {
                font-size: 18px;
                margin-bottom: 12px;
            }

            .click-area {
                height: 150px;
                font-size: 18px;
            }

            .final-score {
                font-size: 44px;
            }

            .cps-live-value {
                font-size: 18px;
            }

            .result-btn {
                font-size: 14px;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <div id="mainScreen" class="screen active">
        <div class="main-header">
            <h1 class="main-title">SUPERSTRIKE 클릭 챌린지</h1>
            <p class="main-subtitle">10초 동안 가장 많은 클릭을 하신 1분께<br>PRO X2 SUPERSTRIKE를 드립니다!</p>
        </div>

        <div class="main-bottom-area">
            <button class="start-btn" onclick="goToGame()">도전하기</button>
            <img src="Logitech_G_Horizontal_Logo_Digital_White.png" alt="Logitech G" class="main-brand-logo">
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="game-container">
            <img src="Logitech_G_Horizontal_Logo_Digital_Cyan_2.png" alt="Logitech G" class="game-logo">

            <div class="event-title">SUPERSTRIKE 클릭 챌린지</div>
            <div class="event-subtitle">지슈스 마우스로 경험하는 최상의 한계 속도 테스트</div>

            <div class="stats">
                <div class="stat-box">
                    <span>Time Left</span>
                    <div id="timeDisplay" style="color: #fff;">10.00</div>
                </div>
                <div class="stat-box">
                    <span>Clicks</span>
                    <div id="clickDisplay" style="color: var(--logi-blue);">0</div>
                </div>
            </div>

            <div class="click-area" id="clickArea">
                여기를 클릭하여 대기
            </div>

            <div class="cps-panel">
                <div class="cps-panel-header">
                    <div class="cps-panel-title">실시간 CPS 차트</div>
                    <div class="cps-live-group">
                        <div class="cps-live-item">
                            <span class="cps-live-label">현재 CPS</span>
                            <span class="cps-live-value" id="liveCps">0.0</span>
                        </div>
                        <div class="cps-live-item">
                            <span class="cps-live-label">평균 CPS</span>
                            <span class="cps-live-value dim" id="avgCps">0.0</span>
                        </div>
                    </div>
                </div>
                <div class="cps-chart-wrap">
                    <div class="chart-legend">
                        <div class="chart-legend-item"><span class="chart-legend-swatch instant"></span>순간 CPS</div>
                        <div class="chart-legend-item"><span class="chart-legend-swatch average"></span>평균 CPS</div>
                    </div>
                    <canvas id="cpsChart" aria-label="실시간 CPS 차트"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <h2>TIME OVER</h2>
            <div class="result-record-subtitle">SUPERSTRIKE 클릭 챌린지 기록</div>

            <div class="final-score"><span id="finalClicks">0</span>회 클릭</div>
            <p style="color: #aaa; font-size: 20px; margin: 5px 0 20px 0;">초당 클릭 수 (CPS) : <span id="finalCps" style="color: var(--logi-blue); font-weight: bold;">0</span></p>

            <div class="result-chart-wrap">
                <div class="chart-legend">
                    <div class="chart-legend-item"><span class="chart-legend-swatch instant"></span>순간 CPS</div>
                    <div class="chart-legend-item"><span class="chart-legend-swatch average"></span>평균 CPS</div>
                </div>
                <canvas id="resultChart" aria-label="CPS 기록 차트"></canvas>
            </div>

            <p class="auto-return-note"><span id="autoReturnCount">10</span>초 후 메인 화면으로 이동합니다</p>

            <div class="result-buttons">
                <button class="result-btn retry-btn" id="retryBtn" onclick="retryGame()">재도전</button>
                <button class="result-btn main-btn" id="mainBtn" onclick="goToMain()">메인 화면으로</button>
            </div>
        </div>
    </div>

    <script>
        const timeLimit = 10;
        const AUTO_RETURN_SECONDS = 10;
        const SAMPLE_INTERVAL = 0.1;

        let clicks = 0;
        let timeLeft = timeLimit;
        let timer = null;
        let countdownTimer = null;
        let resultShowTimer = null;
        let autoReturnInterval = null;
        let gameStartTime = 0;
        let autoReturnLeft = AUTO_RETURN_SECONDS;
        let clickTimestamps = [];
        let chartSeries = [];

        let isCountingDown = false;
        let isGaming = false;
        let isFinished = false;

        const clickArea = document.getElementById('clickArea');
        const clickDisplay = document.getElementById('clickDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const resultOverlay = document.getElementById('resultOverlay');
        const finalClicks = document.getElementById('finalClicks');
        const finalCps = document.getElementById('finalCps');
        const liveCpsEl = document.getElementById('liveCps');
        const avgCpsEl = document.getElementById('avgCps');
        const autoReturnCount = document.getElementById('autoReturnCount');
        const cpsChart = document.getElementById('cpsChart');
        const resultChart = document.getElementById('resultChart');
        const cpsCtx = cpsChart.getContext('2d');
        const resultCtx = resultChart.getContext('2d');

        function clearAllTimers() {
            if (timer !== null) {
                clearInterval(timer);
                timer = null;
            }
            if (countdownTimer !== null) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            if (resultShowTimer !== null) {
                clearTimeout(resultShowTimer);
                resultShowTimer = null;
            }
            clearAutoReturn();
        }

        function clearAutoReturn() {
            if (autoReturnInterval !== null) {
                clearInterval(autoReturnInterval);
                autoReturnInterval = null;
            }
        }

        function getElapsedSeconds() {
            if (!gameStartTime) return 0;
            return Math.min(timeLimit, (performance.now() - gameStartTime) / 1000);
        }

        function getInstantCps(atTime) {
            const windowStart = Math.max(0, atTime - 1);
            return clickTimestamps.filter((t) => t > windowStart && t <= atTime).length;
        }

        function getAverageCps(atTime) {
            if (atTime <= 0) return 0;
            const count = clickTimestamps.filter((t) => t <= atTime).length;
            return count / atTime;
        }

        function sampleSeries(forceElapsed) {
            const elapsed = forceElapsed !== undefined ? forceElapsed : getElapsedSeconds();
            const lastPoint = chartSeries[chartSeries.length - 1];
            if (lastPoint && Math.abs(lastPoint.t - elapsed) < SAMPLE_INTERVAL * 0.5 && forceElapsed === undefined) {
                return;
            }

            chartSeries.push({
                t: elapsed,
                instant: getInstantCps(elapsed),
                average: getAverageCps(elapsed)
            });
        }

        function setupCanvas(canvas, ctx) {
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(rect.width, 1);
            const height = Math.max(rect.height, 1);
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { width, height };
        }

        function drawPolyline(ctx, points, color, lineWidth) {
            if (points.length < 2) return;
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            points.forEach((point, index) => {
                if (index === 0) ctx.moveTo(point.x, point.y);
                else ctx.lineTo(point.x, point.y);
            });
            ctx.stroke();
        }

        function drawCpsChart(canvas, ctx) {
            const size = setupCanvas(canvas, ctx);
            const width = size.width;
            const height = size.height;
            const padding = { top: 12, right: 10, bottom: 24, left: 34 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            const series = chartSeries.length
                ? chartSeries
                : [{ t: 0, instant: 0, average: 0 }, { t: timeLimit, instant: 0, average: 0 }];

            const maxValue = Math.max(
                1,
                ...series.map((p) => p.instant),
                ...series.map((p) => p.average)
            );
            const yMax = Math.ceil(maxValue * 1.15) || 1;

            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = '#252525';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (chartHeight / 4) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            ctx.fillStyle = '#555';
            ctx.font = '10px BrownPro, Noto Sans KR, sans-serif';
            ctx.textAlign = 'center';
            for (let sec = 0; sec <= timeLimit; sec += 2) {
                const x = padding.left + (sec / timeLimit) * chartWidth;
                ctx.fillText(String(sec) + 's', x, height - 6);
            }

            ctx.textAlign = 'right';
            ctx.fillStyle = '#666';
            ctx.fillText(String(yMax), padding.left - 6, padding.top + 8);
            ctx.fillText('0', padding.left - 6, padding.top + chartHeight);

            const toPoint = (point, key) => ({
                x: padding.left + (point.t / timeLimit) * chartWidth,
                y: padding.top + chartHeight - (point[key] / yMax) * chartHeight
            });

            const instantPoints = series.map((p) => toPoint(p, 'instant'));
            const averagePoints = series.map((p) => toPoint(p, 'average'));

            if (instantPoints.length > 1) {
                const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartHeight);
                gradient.addColorStop(0, 'rgba(0, 184, 252, 0.22)');
                gradient.addColorStop(1, 'rgba(0, 184, 252, 0)');
                ctx.beginPath();
                ctx.moveTo(instantPoints[0].x, padding.top + chartHeight);
                instantPoints.forEach((point) => ctx.lineTo(point.x, point.y));
                ctx.lineTo(instantPoints[instantPoints.length - 1].x, padding.top + chartHeight);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            drawPolyline(ctx, averagePoints, '#ff8a3d', 2.5);
            drawPolyline(ctx, instantPoints, '#00B8FC', 2.5);

            const lastInstant = instantPoints[instantPoints.length - 1];
            const lastAverage = averagePoints[averagePoints.length - 1];
            if (lastInstant) {
                ctx.fillStyle = '#00B8FC';
                ctx.beginPath();
                ctx.arc(lastInstant.x, lastInstant.y, 3.5, 0, Math.PI * 2);
                ctx.fill();
            }
            if (lastAverage) {
                ctx.fillStyle = '#ff8a3d';
                ctx.beginPath();
                ctx.arc(lastAverage.x, lastAverage.y, 3.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function updateLiveStats() {
            const elapsed = getElapsedSeconds();
            sampleSeries();
            const instant = getInstantCps(elapsed);
            const average = getAverageCps(elapsed);
            liveCpsEl.textContent = instant.toFixed(1);
            avgCpsEl.textContent = average.toFixed(1);
            drawCpsChart(cpsChart, cpsCtx);
        }

        function resetChartDisplay() {
            clickTimestamps = [];
            chartSeries = [{ t: 0, instant: 0, average: 0 }];
            liveCpsEl.textContent = '0.0';
            avgCpsEl.textContent = '0.0';
            drawCpsChart(cpsChart, cpsCtx);
        }

        function showResultChart() {
            sampleSeries(timeLimit);
            resultOverlay.style.display = 'flex';
            requestAnimationFrame(() => {
                drawCpsChart(resultChart, resultCtx);
                requestAnimationFrame(() => drawCpsChart(resultChart, resultCtx));
            });
        }

        function startAutoReturnCountdown() {
            clearAutoReturn();
            autoReturnLeft = AUTO_RETURN_SECONDS;
            autoReturnCount.textContent = autoReturnLeft;

            autoReturnInterval = setInterval(() => {
                autoReturnLeft -= 1;
                autoReturnCount.textContent = Math.max(autoReturnLeft, 0);
                if (autoReturnLeft <= 0) {
                    goToMain();
                }
            }, 1000);
        }

        function goToGame() {
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            resetGame();
            requestAnimationFrame(() => drawCpsChart(cpsChart, cpsCtx));
        }

        function goToMain() {
            clearAllTimers();
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.add('active');
            resultOverlay.style.display = 'none';
        }

        function retryGame() {
            clearAllTimers();
            resultOverlay.style.display = 'none';
            resetGame();
            requestAnimationFrame(() => drawCpsChart(cpsChart, cpsCtx));
        }

        clickArea.addEventListener('pointerdown', function (e) {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            e.preventDefault();
            handleUserClick();
        });

        function handleUserClick() {
            if (isFinished || isCountingDown) return;

            if (!isGaming) {
                startCountdown();
                return;
            }

            clicks++;
            clickTimestamps.push(getElapsedSeconds());
            clickDisplay.textContent = clicks;
            updateLiveStats();
        }

        function startCountdown() {
            clearAllTimers();
            isCountingDown = true;
            clickArea.classList.add('countdown-active');
            let count = 3;

            clickArea.style.fontSize = '80px';
            clickArea.textContent = count;

            countdownTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    clickArea.textContent = count;
                } else {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            isCountingDown = false;
            isGaming = true;
            clickArea.classList.remove('countdown-active');

            clickArea.style.fontSize = '24px';
            clickArea.textContent = '클릭! 클릭! 클릭!';

            gameStartTime = performance.now();
            resetChartDisplay();

            timer = setInterval(() => {
                const elapsed = getElapsedSeconds();
                timeLeft = Math.max(0, timeLimit - elapsed);
                timeDisplay.textContent = timeLeft.toFixed(2);
                updateLiveStats();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 50);
        }

        function endGame() {
            clearAllTimers();
            isGaming = false;
            isFinished = true;
            timeLeft = 0;
            timeDisplay.textContent = '0.00';
            clickArea.textContent = '종료!';

            sampleSeries(timeLimit);
            finalClicks.textContent = clicks;
            finalCps.textContent = (clicks / timeLimit).toFixed(1);
            liveCpsEl.textContent = getInstantCps(timeLimit).toFixed(1);
            avgCpsEl.textContent = (clicks / timeLimit).toFixed(1);
            drawCpsChart(cpsChart, cpsCtx);

            resultShowTimer = setTimeout(() => {
                showResultChart();
                startAutoReturnCountdown();
            }, 300);
        }

        function resetGame() {
            clearAllTimers();

            clicks = 0;
            timeLeft = timeLimit;
            gameStartTime = 0;
            isCountingDown = false;
            isGaming = false;
            isFinished = false;

            clickDisplay.textContent = '0';
            timeDisplay.textContent = '10.00';
            clickArea.classList.remove('countdown-active');
            clickArea.style.fontSize = '24px';
            clickArea.textContent = '여기를 클릭하여 대기';
            resultOverlay.style.display = 'none';
            autoReturnLeft = AUTO_RETURN_SECONDS;
            autoReturnCount.textContent = AUTO_RETURN_SECONDS;
            resetChartDisplay();
        }

        window.addEventListener('resize', () => {
            drawCpsChart(cpsChart, cpsCtx);
            if (resultOverlay.style.display === 'flex') {
                drawCpsChart(resultChart, resultCtx);
            }
        });

        resetChartDisplay();
    </script>
</body>
</html>
